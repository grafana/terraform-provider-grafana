# Builds the Linux amd64 provider binary and uploads it as a workflow artifact.
# Use with validate-release.yml (workflow_dispatch): pass this workflow run id as
# grafana_provider_dev_override_run_id and use the same artifact name below.
#
# Validating a specific commit:
#   Actions → run this workflow → choose branch or enter SHA in git_ref → note Run ID + artifact name.
#   Then run "Validate field-eng terraformprovidergrafanatest deploy" with those values.

name: Field Eng — Linux provider artifact

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Branch, tag, or full commit SHA to build (leave empty = tip of selected branch when you click Run workflow)'
        required: false
        default: ''

permissions:
  contents: read

env:
  ARTIFACT_NAME: terraform-provider-grafana_linux_amd64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.git_ref || github.sha }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux amd64 plugin (matches Field Eng runner / configure-grafana-provider-dev-override.sh)
        env:
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o terraform-provider-grafana .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: terraform-provider-grafana
          if-no-files-found: error
