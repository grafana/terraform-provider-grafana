# Manual validation: build an unpublished Linux amd64 provider, upload it as a workflow artifact,
# dispatch grafana/field-eng-appenv-deployment "terraformprovidergrafanatest - deploy", and fail
# if that deploy fails.
#
# This workflow is workflow_dispatch-only — not triggered by releases and not invoked from release.yml.
#
# Producer (this repo): scripts/validate-unpublished-provider-*.sh
#   1. Build terraform-provider-grafana for linux/amd64 (binary basename must be terraform-provider-grafana).
#   2. Upload artifact FIELD_ENG_DEV_ARTIFACT_NAME (terraform-provider-grafana_linux_amd64).
#   3. Push an ephemeral branch on field-eng at the same commit as main (unique ref per run).
#   4. Dispatch terraformprovidergrafanatest - deploy with:
#        - deployment_tooling_version = that branch
#        - grafana_provider_dev_override_run_id = this workflow run id
#
# Consumer (field-eng-appenv-deployment):
#   - .github/workflows/terraformprovidergrafanatest_deploy.yml → generic_deploy_to_existing_stack.yml
#   - scripts/configure-grafana-provider-dev-override.sh downloads the artifact from this run via
#     gh run download -R grafana/terraform-provider-grafana -n terraform-provider-grafana_linux_amd64
#   - Sets TF_CLI_CONFIG_FILE with provider_installation.dev_overrides for grafana/grafana
#   - Artifact download uses Vault common_github:fe_svc_tpg_artifact_pat (GRAFANA_LABS_FE_SVC_TPG_ARTIFACT_PAT).
#     Actions read on grafana/terraform-provider-grafana only.
#
# Credentials:
#   field-eng-validate:github-token — Vault path for this repo (get-vault-secrets):
#     FIELD_ENG_VALIDATE_GITHUB_TOKEN; PAT for push/delete ephemeral branches and dispatch/watch deploy
#     on grafana/field-eng-appenv-deployment (contents + actions write).

name: validate unpublished provider against terraformprovidergrafanatest appenv deploy

on:
  workflow_dispatch:
concurrency:
  group: field-eng-terraformprovidergrafanatest-${{ github.repository }}
  cancel-in-progress: false

env:
  FIELD_ENG_DEV_ARTIFACT_NAME: terraform-provider-grafana_linux_amd64

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux amd64 plugin
        env:
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o terraform-provider-grafana .

      - name: Upload artifact for field-eng dev_overrides
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.FIELD_ENG_DEV_ARTIFACT_NAME }}
          path: terraform-provider-grafana
          if-no-files-found: error

  validate:
    needs: [build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FIELD_ENG_REPO: grafana/field-eng-appenv-deployment
      BASE_REF: main
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Get secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f619a637e489e8e7749cf4966ee2776e4178a303
        with:
          repo_secrets: |
            FIELD_ENG_VALIDATE_GITHUB_TOKEN=field-eng-validate:github-token

      - name: Push ephemeral branch
        id: branch
        env:
          GH_TOKEN: ${{ env.FIELD_ENG_VALIDATE_GITHUB_TOKEN }}
        run: ./scripts/validate-unpublished-provider-push-branch.sh

      - name: Dispatch terraformprovidergrafanatest deploy and wait
        env:
          GH_TOKEN: ${{ env.FIELD_ENG_VALIDATE_GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          DEV_RUN: ${{ github.run_id }}
          FIELD_ENG_DEV_ARTIFACT_NAME: ${{ env.FIELD_ENG_DEV_ARTIFACT_NAME }}
        run: ./scripts/validate-unpublished-provider-dispatch-and-wait.sh

      - name: Delete ephemeral branch
        if: always() && steps.branch.outputs.branch != ''
        env:
          GH_TOKEN: ${{ env.FIELD_ENG_VALIDATE_GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail
          echo "Deleting branch ${BRANCH} on ${FIELD_ENG_REPO} ..."
          gh api -X DELETE "repos/${FIELD_ENG_REPO}/git/refs/heads/${BRANCH}" || echo "::warning::Branch delete failed (may already be gone)."
