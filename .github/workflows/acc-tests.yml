name: acceptance tests
on:
  pull_request: {}
  push:
    branches:
      - main

# Cancel in-flight runs for the same PR / branch when a new push arrives.
# Pushes to main each get their own group so they are never cancelled.
concurrency:
  group: acc-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# These permissions are needed to assume roles from Github's OIDC.
permissions:
  contents: read

jobs:
  # Tests that Terraform can actually install and use the provider
  # Ex: https://github.com/grafana/terraform-provider-grafana/issues/1372
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      - run: make integration-test

  # Per-package cloud-instance tests.
  # Each shard provisions its own ephemeral Grafana Cloud stack via
  # `tools/teststack up`, runs `go test` against it, then tears it down.
  # Different PRs run concurrently because each shard's concurrency group
  # is scoped to (shard, branch). The shared-stack cloudprovider tests
  # live in the `cloudprovider` job below.
  cloudinstance:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: appplatform
            pkg: ./internal/resources/appplatform/...
            features: basic
          - name: asserts
            pkg: ./internal/resources/asserts/...
            features: basic,assertions
          - name: cloudintegrations
            pkg: ./internal/resources/cloudintegrations/...
            features: basic,integrations
          - name: fleetmanagement
            pkg: ./internal/resources/fleetmanagement/...
            features: basic,fleet
          - name: grafana
            pkg: ./internal/resources/grafana/...
            features: basic
          - name: k6
            pkg: ./internal/resources/k6/...
            features: basic,k6
          - name: machinelearning
            pkg: ./internal/resources/machinelearning/...
            features: basic,mloss
          - name: oncall
            pkg: ./internal/resources/oncall/...
            features: basic,oncall
          - name: slo
            pkg: ./internal/resources/slo/...
            features: basic,slo
          - name: syntheticmonitoring
            pkg: ./internal/resources/syntheticmonitoring/...
            features: basic,sm
          - name: examples
            pkg: ./internal/resources
            testargs: -run ^TestAccExamples$
            features: basic,k6,sm,oncall,fleet,assertions,mloss,slo,integrations
    name: cloudinstance (${{ matrix.name }})
    # No turnstyle / global concurrency group is needed here: each shard
    # provisions its own ephemeral Grafana Cloud stack so different PRs do
    # not contend on shared state. The workflow-level concurrency at the
    # top already cancels stale runs on new pushes to the same PR.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      # Freshly-created Grafana Cloud stacks routinely return 503/504 from
      # individual stack-side microservices (teams, service-accounts) for
      # tens of seconds even after /api/health returns 200. Use a longer
      # retry budget than the provider's defaults so the cloudinstance
      # tests survive the warm-up window.
      GRAFANA_RETRIES: "10"
      GRAFANA_RETRY_WAIT: "5"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      - name: Get bootstrap secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f619a637e489e8e7749cf4966ee2776e4178a303
        with:
          repo_secrets: |
            GRAFANA_CLOUD_ACCESS_POLICY_TOKEN=cloud-tests:api-key
            GRAFANA_CLOUD_ORG=cloud-tests:org
      - name: Provision per-shard stack
        id: teststack-up
        run: |
          set -euo pipefail
          # gcom slug rules: ^[a-z][a-z0-9]+$, max 29 chars, must be globally
          # unique within the org. Concatenate a stable "tftest" prefix
          # (matches the convention in existing cloud acceptance tests), the
          # workflow run id (unique per run), and the matrix shard name,
          # then strip any non-alphanumeric chars and truncate.
          raw="tftest${GITHUB_RUN_ID}${MATRIX_NAME}"
          slug=$(printf '%s' "$raw" | tr -cd 'a-z0-9' | cut -c -29)
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          go run ./tools/teststack up \
            --prefix="$slug" \
            --features="$MATRIX_FEATURES" \
            --output="$RUNNER_TEMP/teststack.env"
          # Mask sensitive values in the GitHub Actions logs and forward them
          # to subsequent steps via $GITHUB_ENV.
          while IFS='=' read -r k v; do
            case "$k" in GRAFANA_AUTH|GRAFANA_K6_ACCESS_TOKEN|GRAFANA_SM_ACCESS_TOKEN|GRAFANA_ONCALL_ACCESS_TOKEN|GRAFANA_FLEET_MANAGEMENT_AUTH|GRAFANA_CLOUD_PROVIDER_ACCESS_TOKEN)
              echo "::add-mask::$v" ;;
            esac
            echo "$k=$v" >> "$GITHUB_ENV"
          done < "$RUNNER_TEMP/teststack.env"
        env:
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_FEATURES: ${{ matrix.features }}
      - name: Run package tests
        run: make testacc-cloud-instance-pkg PKG="$MATRIX_PKG" TESTARGS="$MATRIX_TESTARGS -parallel=4"
        env:
          MATRIX_PKG: ${{ matrix.pkg }}
          MATRIX_TESTARGS: ${{ matrix.testargs }}
      - name: Teardown stack
        if: always() && steps.teststack-up.outputs.slug != ''
        run: |
          go run ./tools/teststack down --slug="${{ steps.teststack-up.outputs.slug }}" || true

  # Cloud Provider tests target an AWS-linked stack with a pre-existing IAM
  # role; automating that setup per PR is out of scope, so they continue to
  # run against a shared, long-lived stack. A turnstyle wait keeps the FIFO
  # cross-PR queue introduced in #2824 so concurrent runs don't trample each
  # other on the shared stack.
  cloudprovider:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - name: Wait for earlier cloudprovider runs
        uses: softprops/turnstyle@fa86562458e34a9067f0dc1316a76b3975b1c413 # v3.3.1
        with:
          job-to-wait-for: cloudprovider
          poll-interval-seconds: 30
          abort-after-seconds: 2400 # 40 min safety net
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      - name: Get Secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@f619a637e489e8e7749cf4966ee2776e4178a303
        with:
          repo_secrets: |
            GRAFANA_AUTH=cloud-instance-tests:auth
            GRAFANA_URL=cloud-instance-tests:url
            GRAFANA_ONCALL_ACCESS_TOKEN=cloud-instance-tests:oncall-token
            GRAFANA_SM_ACCESS_TOKEN=cloud-instance-tests:sm-token
            GRAFANA_K6_ACCESS_TOKEN=cloud-instance-k6-tests:k6-token
            GRAFANA_SM_URL=cloud-instance-tests:sm-url
            GRAFANA_STACK_ID=cloud-instance-k6-tests:stack-id
            GRAFANA_CLOUD_PROVIDER_URL=cloudprovider-tests:url
            GRAFANA_CLOUD_PROVIDER_TEST_AWS_ACCOUNT_RESOURCE_ID=cloudprovider-tests:test-aws-account-resource-id
            GRAFANA_CLOUD_PROVIDER_ACCESS_TOKEN=cloudprovider-tests:access-token
            GRAFANA_CLOUD_PROVIDER_AWS_ROLE_ARN=cloudprovider-tests:aws-role-arn
            GRAFANA_CLOUD_PROVIDER_TEST_STACK_ID=cloudprovider-tests:test-stack-id
            GRAFANA_FLEET_MANAGEMENT_AUTH=cloud-instance-tests:fleet-management-auth
            GRAFANA_FLEET_MANAGEMENT_URL=cloud-instance-tests:fleet-management-url
      - uses: iFaxity/wait-on-action@a7d13170ec542bdca4ef8ac4b15e9c6aa00a6866 # v1.2.1
        with:
          resource: ${{ env.GRAFANA_URL }}
          interval: 2000 # 2s
          timeout: 30000 # 30s
      - run: make testacc-cloud-instance-pkg PKG=./internal/resources/cloudprovider/... TESTARGS="-parallel=2"
  
  local:
    strategy:
      fail-fast: false # Let all versions run, even if one fails
      matrix:
        # OSS tests, run on all supported versions (see https://endoflife.date/grafana)
        version: ['13.0.1', '12.4.3', '12.3.6', '12.2.8', '11.6.14']
        type: ['oss']
        subset: ['basic', 'other', 'long']
        include:
          # Run Git Sync only on Grafana main so we can cover provisioning APIs that
          # are not released yet without pulling the entire OSS "other" suite onto
          # an unreleased Grafana build.
          - version: 'main'
            type: 'oss'
            subset: 'provisioning'
          # Run the generic app platform resource tests on Grafana main for the same reason.
          - version: 'main'
            type: 'oss'
            subset: 'generic'
          - version: '13.0.1'
            type: 'oss'
            subset: examples
          - version: '12.4.3'
            type: 'oss'
            subset: examples
          - version: '11.6.14'
            type: 'oss'
            subset: examples
          # TLS proxy tests, run only on latest version
          - version: '13.0.1'
            type: 'tls'
            subset: 'basic'
          # Sub-path tests. Runs tests on localhost:3000/grafana/
          - version: '13.0.1'
            type: 'subpath'
            subset: 'basic'
          - version: '13.0.1'
            type: 'subpath'
            subset: 'other'
          # Enterprise tests
          - version: '13.0.1'
            type: 'enterprise'
            subset: 'enterprise'
          - version: '12.4.3'
            type: 'enterprise'
            subset: 'enterprise'
          - version: '11.6.14'
            type: 'enterprise'
            subset: 'enterprise'
          # Generate tests
          - version: '13.0.1'
            type: 'enterprise'
            subset: 'generate'
          - version: '12.4.3'
            type: 'enterprise'
            subset: 'generate'
          - version: '11.6.14'
            type: 'enterprise'
            subset: 'generate'
    name: ${{ matrix.version }} - ${{ matrix.type }} - ${{ matrix.subset }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check if fork
        if: github.event_name == 'pull_request'
        env:
          REPO_FULL_NAME: ${{ github.repository }}
          PR_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          MATRIX_TYPE: ${{ matrix.type }}
        run: |
          if [ "$MATRIX_TYPE" = "enterprise" ] && [ "$PR_REPO_FULL_NAME" != "$REPO_FULL_NAME" ]; then
            echo "IS_FORK=true" >> $GITHUB_ENV
          else
            echo "IS_FORK=false" >> $GITHUB_ENV
          fi
      - name: Skip job if fork
        if: github.event_name == 'pull_request' && env.IS_FORK == 'true'
        run: |
          echo "Skipping job because PR is from a fork"
          exit 0
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      - name: Get Enterprise License
        uses: grafana/shared-workflows/actions/get-vault-secrets@f619a637e489e8e7749cf4966ee2776e4178a303
        if: matrix.type == 'enterprise'
        with:
          repo_secrets: |
            GF_ENTERPRISE_LICENSE_TEXT=enterprise:license
      - name: Cache Docker image
        uses: ScribeMD/docker-cache@fb28c93772363301b8d0a6072ce850224b73f74e # v0.5.0
        with:
          key: docker-${{ runner.os }}-${{ matrix.type == 'enterprise' && 'enterprise' || 'oss' }}-${{ matrix.version }}
      - uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 30
          max_attempts: 3 # Try 3 times to make sure we don't report failures on flaky tests
          command: make testacc-${{ matrix.type }}-docker
        env:
          GRAFANA_VERSION: ${{ matrix.version }}
          GF_FEATURE_TOGGLES_ENABLE: ${{ matrix.subset == 'provisioning' && 'nestedFolders,ssoSettingsApi,ssoSettingsSAML,ssoSettingsLDAP,grafanaManagedRecordingRulesDatasources,enableSCIM,alertEnrichmentMultiStep,alertEnrichmentConditional,alertingEnrichmentAssistantInvestigations,provisioning,secretsManagementAppPlatform,secretsManagementAppPlatformUI,grafanaAPIServerWithExperimentalAPIs,secretsManagementAppPlatformAwsKeeper' || '' }}
          TESTARGS: >- 
            ${{ matrix.subset == 'enterprise' && '-skip="TestAccGenerate" -parallel 2' || '' }}
            ${{ matrix.subset == 'basic' && '-run=".*_basic" -short -parallel 2' || '' }}
            ${{ matrix.subset == 'other' && '-skip=".*_basic" -short -parallel 2' || '' }}
            ${{ matrix.subset == 'long' && '-run=".*longtest" -parallel 1' || '' }}
            ${{ matrix.subset == 'examples' && '-run=".*Examples" -parallel 1' || '' }}
            ${{ matrix.subset == 'generate' && '-run="TestAccGenerate" -parallel 1' || '' }}
            ${{ matrix.subset == 'provisioning' && '-run="TestAccProvisioning" -parallel 1' || '' }}
            ${{ matrix.subset == 'generic' && '-run="TestAccGenericResource_" -parallel 1' || '' }}
